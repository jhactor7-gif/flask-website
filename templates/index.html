
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Home</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

body{
    background:#f5f6f7;
}

.header{
    background:white;
    border-bottom:1px solid #e5e5e5;
}

.top-menu{
    max-width:1280px;
    margin:auto;
    display:flex;
    justify-content:flex-end;
    gap:20px;
    padding:10px;
    font-size:13px;
    color:#666;
}

.logo-area{
    max-width:1280px;
    margin:auto;
    padding:30px 20px;
    text-align:center;
}

.logo{
    font-size:56px;
    font-weight:900;
    color:#03c75a;
    margin-bottom:20px;
}

.search-wrap{
    max-width:700px;
    margin:auto;
    display:flex;
    border:3px solid #03c75a;
    border-radius:50px;
    overflow:hidden;
    background:white;
}

.search-wrap input{
    flex:1;
    border:none;
    outline:none;
    padding:18px;
    font-size:18px;
}

.search-wrap button{
    width:120px;
    border:none;
    background:#03c75a;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.nav{
    max-width:1280px;
    margin:20px auto;
    background:white;
    border-radius:12px;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.nav a{
    text-decoration:none;
    color:#03c75a;
    font-weight:bold;
}

.container{
    max-width:1280px;
    margin:20px auto;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    padding:0 10px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.card h2{
    margin-bottom:15px;
    font-size:20px;
}

.news-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.news-item{
    padding:12px;
    border:1px solid #eee;
    border-radius:8px;
    cursor:pointer;
}

.news-item:hover{
    background:#f8f8f8;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.shop-item{
    border:1px solid #eee;
    border-radius:10px;
    overflow:hidden;
}

.shop-img{
    height:120px;
    background:linear-gradient(45deg,#03c75a,#00d084);
}

.shop-info{
    padding:10px;
}

.weather{
    text-align:center;
}

.temp{
    font-size:48px;
    font-weight:bold;
    color:#03c75a;
}

.login-btn{
    width:100%;
    padding:15px;
    background:#03c75a;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.footer{
    margin-top:40px;
    background:white;
    padding:30px;
    text-align:center;
    color:#777;
}

@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .logo{
        font-size:42px;
    }
}
</style>
</head>

<body>

<header class="header">

    <div class="top-menu">
        <span>메일</span>
        <span>카페</span>
        <span>블로그</span>
        <span>쇼핑</span>
    </div>

    <div class="logo-area">
        <div class="logo">PORTAL</div>

        <div class="search-wrap">
            <input type="text" placeholder="검색어를 입력하세요">
            <button onclick="searchSite()">검색</button>
        </div>
    </div>

</header>

<nav class="nav">
    <a href="#">뉴스</a>
    <a href="#">쇼핑</a>
    <a href="#">증권</a>
    <a href="#">부동산</a>
    <a href="#">지도</a>
    <a href="#">웹툰</a>
    <a href="#">게임</a>
    <a href="#">스포츠</a>
</nav>

<div class="container">

    <main>

        <section class="card">
            <h2>📰 오늘의 뉴스</h2>

            <div class="news-list">
                <div class="news-item">AI 기술 발전 속도 가속화</div>
                <div class="news-item">클라우드 시장 성장 지속</div>
                <div class="news-item">스타트업 투자 회복세</div>
                <div class="news-item">웹 개발 트렌드 변화</div>
                <div class="news-item">오픈소스 생태계 확대</div>
            </div>
        </section>

        <section class="card" style="margin-top:20px;">
            <h2>🛒 쇼핑 추천</h2>

            <div class="grid">

                <div class="shop-item">
                    <div class="shop-img"></div>
                    <div class="shop-info">
                        <h4>상품 1</h4>
                        <p>₩29,900</p>
                    </div>
                </div>

                <div class="shop-item">
                    <div class="shop-img"></div>
                    <div class="shop-info">
                        <h4>상품 2</h4>
                        <p>₩49,900</p>
                    </div>
                </div>

                <div class="shop-item">
                    <div class="shop-img"></div>
                    <div class="shop-info">
                        <h4>상품 3</h4>
                        <p>₩99,900</p>
                    </div>
                </div>

            </div>
        </section>

    </main>

    <aside>

        <section class="card">
            <h2>로그인</h2>
            <button class="login-btn">로그인</button>
        </section>

        <section class="card" style="margin-top:20px;">
            <h2>날씨</h2>

            <div class="weather">
                <div class="temp">25°</div>
                <p>맑음 ☀️</p>
                <p>서울</p>
            </div>
        </section>

        <section class="card" style="margin-top:20px;">
            <h2>실시간 인기 검색어</h2>
            <ol style="padding-left:20px;line-height:2;">
                <li>ChatGPT</li>
                <li>Python</li>
                <li>Flask</li>
                <li>Vercel</li>
                <li>GitHub</li>
            </ol>
        </section>

    </aside>

</div>

<footer class="footer">
    © 2026 Portal Home
</footer>

<script>
function searchSite() {
    const keyword =
        document.querySelector("input").value;

    if(keyword.trim() === ""){
        alert("검색어를 입력하세요.");
        return;
    }

    alert("검색: " + keyword);
}
</script>

</body>
</html>
